name: Build Android APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows manual triggering

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: mobile-app/WorkoutGamifierMobile/package-lock.json

    - name: Install dependencies
      working-directory: ./mobile-app/WorkoutGamifierMobile
      run: npm ci

    - name: Setup Expo and EAS CLI
      run: |
        npm install -g @expo/cli eas-cli
        echo "Expo CLI version:"
        npx expo --version
        echo "EAS CLI version:"
        npx eas --version

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Verify Expo authentication
      working-directory: ./mobile-app/WorkoutGamifierMobile
      run: |
        # Verify authentication using EXPO_TOKEN
        npx expo whoami
      env:
        EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        CI: 1

    - name: Configure EAS Build
      working-directory: ./mobile-app/WorkoutGamifierMobile
      run: |
        # Check if app.json or app.config.js exists and has android.package
        if [ -f app.json ]; then
          echo "Found app.json, checking android.package..."
          if ! grep -q '"package"' app.json; then
            echo "Adding android.package to app.json..."
            # Backup original
            cp app.json app.json.backup
            # Add android.package if missing
            node -e "
              const fs = require('fs');
              const config = JSON.parse(fs.readFileSync('app.json', 'utf8'));
              if (!config.expo.android) config.expo.android = {};
              if (!config.expo.android.package) config.expo.android.package = 'com.workoutgamifier.app';
              fs.writeFileSync('app.json', JSON.stringify(config, null, 2));
            "
            echo "Updated app.json with android.package"
          fi
        fi
        
        # Create eas.json with local credentials configuration
        echo '{
          "cli": {
            "version": ">= 5.4.0"
          },
          "build": {
            "development": {
              "android": {
                "buildType": "apk",
                "gradleCommand": ":app:assembleDebug"
              },
              "channel": "development"
            },
            "local-debug": {
              "android": {
                "buildType": "apk",
                "gradleCommand": ":app:assembleDebug",
                "withoutCredentials": true
              },
              "channel": "development"
            },
            "preview": {
              "android": {
                "buildType": "apk"
              }
            },
            "production": {
              "android": {
                "buildType": "app-bundle"
              }
            }
          }
        }' > eas.json
        
        # Show current configuration for debugging
        echo "Created eas.json configuration:"
        cat eas.json
        echo "Current app.json android configuration:"
        cat app.json | grep -A 10 -B 5 "android" || echo "No android config found"
      env:
        EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        CI: 1

    - name: Build APK
      working-directory: ./mobile-app/WorkoutGamifierMobile
      run: |
        # Build for Android using local-debug profile (no credentials required)
        npx eas build --platform android --profile local-debug --non-interactive --wait
      env:
        EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        CI: 1

    - name: Download APK
      working-directory: ./mobile-app/WorkoutGamifierMobile
      run: |
        # Get the latest build URL and download the APK
        BUILD_URL=$(npx eas build:list --platform=android --limit=1 --json | jq -r '.[0].artifacts.buildUrl')
        echo "Build URL: $BUILD_URL"
        
        if [ "$BUILD_URL" != "null" ] && [ -n "$BUILD_URL" ]; then
          curl -L -o WorkoutGamifier.apk "$BUILD_URL"
          echo "APK downloaded successfully"
        else
          echo "Failed to get APK download URL"
          exit 1
        fi
      env:
        EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        CI: 1

    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: WorkoutGamifier-APK
        path: mobile-app/WorkoutGamifierMobile/WorkoutGamifier.apk
        retention-days: 30

    - name: Create Release (on main branch)
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: WorkoutGamifier v${{ github.run_number }}
        body: |
          Automated build of WorkoutGamifier Mobile App
          
          📱 **Installation Instructions:**
          1. Download the APK file below
          2. Enable "Install from unknown sources" in your Android settings
          3. Install the APK on your device
          
          🎮 **App Features:**
          - 10+ built-in exercises
          - 3 default workout pools  
          - 8 default point-earning actions
          - Complete offline functionality
        files: mobile-app/WorkoutGamifierMobile/WorkoutGamifier.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
