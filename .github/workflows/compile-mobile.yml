name: Build Android APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows manual triggering

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: ./mobile-app/WorkoutGamifierMobile/package-lock.json

    - name: Setup Expo CLI
      run: npm install -g @expo/cli

    - name: Install dependencies
      working-directory: ./mobile-app/WorkoutGamifierMobile
      run: npm ci

    - name: Setup EAS CLI
      run: npm install -g eas-cli

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Create Expo account and login
      working-directory: ./mobile-app/WorkoutGamifierMobile
      run: |
        # You'll need to set EXPO_TOKEN in your GitHub secrets
        echo $EXPO_TOKEN | expo login --non-interactive
      env:
        EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    - name: Configure EAS Build
      working-directory: ./mobile-app/WorkoutGamifierMobile
      run: |
        # Initialize EAS configuration if it doesn't exist
        if [ ! -f eas.json ]; then
          eas build:configure --platform android --non-interactive
        fi

    - name: Build APK
      working-directory: ./mobile-app/WorkoutGamifierMobile
      run: |
        # Build for Android
        eas build --platform android --profile preview --non-interactive --wait
      env:
        EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    - name: Download APK
      working-directory: ./mobile-app/WorkoutGamifierMobile
      run: |
        # Get the latest build URL and download the APK
        BUILD_URL=$(eas build:list --platform=android --limit=1 --json | jq -r '.[0].artifacts.buildUrl')
        echo "Build URL: $BUILD_URL"
        
        if [ "$BUILD_URL" != "null" ] && [ -n "$BUILD_URL" ]; then
          curl -L -o WorkoutGamifier.apk "$BUILD_URL"
          echo "APK downloaded successfully"
        else
          echo "Failed to get APK download URL"
          exit 1
        fi
      env:
        EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: WorkoutGamifier-APK
        path: mobile-app/WorkoutGamifierMobile/WorkoutGamifier.apk
        retention-days: 30

    - name: Create Release (on main branch)
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: WorkoutGamifier v${{ github.run_number }}
        body: |
          Automated build of WorkoutGamifier Mobile App
          
          📱 **Installation Instructions:**
          1. Download the APK file below
          2. Enable "Install from unknown sources" in your Android settings
          3. Install the APK on your device
          
          🎮 **App Features:**
          - 10+ built-in exercises
          - 3 default workout pools  
          - 8 default point-earning actions
          - Complete offline functionality
        files: mobile-app/WorkoutGamifierMobile/WorkoutGamifier.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
